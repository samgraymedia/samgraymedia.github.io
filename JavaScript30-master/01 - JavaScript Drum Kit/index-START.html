<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS Drum Kit</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>


  <div class="keys">
    <div data-key="65" class="key">
      <kbd>A</kbd>
      <span class="sound">clap</span>
    </div>
    <div data-key="83" class="key">
      <kbd>S</kbd>
      <span class="sound">hihat</span>
    </div>
    <div data-key="68" class="key">
      <kbd>D</kbd>
      <span class="sound">kick</span>
    </div>
    <div data-key="70" class="key">
      <kbd>F</kbd>
      <span class="sound">openhat</span>
    </div>
    <div data-key="71" class="key">
      <kbd>G</kbd>
      <span class="sound">boom</span>
    </div>
    <div data-key="72" class="key">
      <kbd>H</kbd>
      <span class="sound">ride</span>
    </div>
    <div data-key="74" class="key">
      <kbd>J</kbd>
      <span class="sound">snare</span>
    </div>
    <div data-key="75" class="key">
      <kbd>K</kbd>
      <span class="sound">tom</span>
    </div>
    <div data-key="76" class="key">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div>
  </div>

  <audio data-key="65" src="sounds/clap.wav"></audio>
  <audio data-key="83" src="sounds/hihat.wav"></audio>
  <audio data-key="68" src="sounds/kick.wav"></audio>
  <audio data-key="70" src="sounds/openhat.wav"></audio>
  <audio data-key="71" src="sounds/boom.wav"></audio>
  <audio data-key="72" src="sounds/ride.wav"></audio>
  <audio data-key="74" src="sounds/snare.wav"></audio>
  <audio data-key="75" src="sounds/tom.wav"></audio>
  <audio data-key="76" src="sounds/tink.wav"></audio>

<script>

// play sound function that is run when a key is pressed The e stands for event
function playSound(e){
  //console logging the Corresponding number for that key
  console.log(e.keyCode);
  //looking to see if there an audio element with a data-key number the same as the keycode a user has pressed
  const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
  //looking to see if there an div with a data-key number the same as the keycode a user has pressed
  const key = document.querySelector(`.key[data-key="${e.keyCode}"]`);
   //stops function from running if there isn't an audio element with a data-key number the same as the keycode a user has pressed
  if(!audio) return;
  //logging said element
  console.log(audio);
  console.log(key);
  //putting audio to the start each time the function is run
  audio.currentTime = 0;
  //playing said audio element
  audio.play();
  key.classList.add('playing');
}

//removing the css transition after the transtion is finished
function removeTransition(e){
  if(e.propertyName !=='transform') return; //skip if not a transform
  console.log(e.propertyName);
  this.classList.remove('playing');
}

const keys = document.querySelectorAll('.key');
keys.forEach(keys => keys.addEventListener('transitionend', removeTransition));


//Listening for when a user presses down an a key on their board. 
window.addEventListener('keydown', playSound);
</script>


</body>
</html>
