<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JS + CSS Clock</title>
</head>
<body>


    <div class="clock">
      <div class="clock-face">
        <div class="hand hour-hand"></div>
        <div class="hand min-hand"></div>
        <div class="hand second-hand"></div>
      </div>
    </div>


  <style>
    html {
      background:#018DED url(http://unsplash.it/1500/1000?image=881&blur=50);
      background-size:cover;
      font-family:'helvetica neue';
      text-align: center;
      font-size: 10px;
    }

    body {
      margin: 0;
      font-size: 2rem;
      display:flex;
      flex:1;
      min-height: 100vh;
      align-items: center;
    }

    .clock {
      width: 30rem;
      height: 30rem;
      border:20px solid white;
      border-radius:50%;
      margin:50px auto;
      position: relative;
      padding:2rem;
      box-shadow:
        0 0 0 4px rgba(0,0,0,0.1),
        inset 0 0 0 3px #EFEFEF,
        inset 0 0 10px black,
        0 0 10px rgba(0,0,0,0.2);
    }

    .clock-face {
      position: relative;
      width: 100%;
      height: 100%;
      transform: translateY(-3px); /* account for the height of the clock hands */
    }

    .hand {
      width:50%;
      height:6px;
      background:black;
      position: absolute;
      top:50%;
      transform-origin: 100%;
      transform: rotate(90deg);
      transition: all 0.05s;
      transition-timing-function: cubic-bezier(0.1, 2.7, 0.58, 1);
    }

  </style>
  <script>
  const secondHand = document.querySelector('.second-hand');
  const minuteHand = document.querySelector('.min-hand');
  const hourHand = document.querySelector('.hour-hand');
  const hands = document.querySelector('.hand');
  function setDate() {
    //stopping the transform reset
    if (secondsDegrees === 90) {
      hands.style.transition = "none";
    } else {
      hands.style.transition = "all 0.05s";
    }
    //getting the date
    const now = new Date();
    //getting the seconds
    const seconds = now.getSeconds();
    //turning the seconds into degrees, off setting the 90degs that i've set in the css
    var secondsDegrees = ((seconds / 60) * 360) + 90;
    console.log(secondsDegrees);
    //transforming the second hand
    secondHand.style.transform = `rotate(${secondsDegrees}deg)`;
    //getting the hours
    const hours = now.getHours();
    //turning the hours into degrees, off setting the 90degs that i've set in the css
    const hoursDegrees = ((hours / 60) * 360) + 90;
    //transforming the hour hand
    hourHand.style.transform = `rotate(${hoursDegrees}deg)`;
    //getting the minutes
    const minutes = now.getMinutes();
    //turning the hours into degrees, off setting the 90degs that i've set in the css
    const minutesDegrees = ((minutes / 60) * 360) + 90;
    //transforming the hour hand
    minuteHand.style.transform = `rotate(${minutesDegrees}deg)`;
    

    
    
  }
  //run the setDate function every second
  setInterval(setDate, 1000);

  </script>
</body>
</html>
