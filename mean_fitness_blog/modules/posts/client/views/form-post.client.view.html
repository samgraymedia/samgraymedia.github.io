<section class="wrap create-post">
  <div class="page-header">
    <h1>{{vm.post._id ? 'Edit Post' : 'New Post'}}</h1>
  </div>
  <div class="row">
    <div class="col col-1">
      <form name="vm.form.postForm" class="form-horizontal" ng-submit="vm.save(vm.form.postForm.$valid)" novalidate>
        <fieldset>
          <div class="row">
            <div class="form-group col col-3" show-errors>
              <label class="control-label" for="title">Title</label>
              <input name="title" type="text" ng-model="vm.post.title" id="title" class="form-control" placeholder="Title" required>
            </div>

            <div class="form-group col col-3" show-errors>
              <label class="control-label" for="tags">Tags</label>
              <input name="tags" type="text" ng-model="vm.post.tags" id="tags" class="form-control" placeholder="tags" required>
            </div>
            <div class="form-group col col-3" show-errors>
              <label class="control-label" for="category">Category</label><br>
              <select name="category" ng-model="vm.post.category" id="category" class="form-control">
                <option value="">Please select a category</option>
                <option value="weights">weights</option>
                <option value="stamina">stamina</option>
                <option value="sport">sport</option>
              </select>
            </div>
            <div class="form-group col col-1" show-errors>
              <label class="control-label" for="body">Body</label>
              <textarea name="body" type="text" ng-model="vm.post.body" id="body" class="form-control" placeholder="Body" required></textarea>
            </div>
            <div class="form-group col col-1">
              <button type="submit" class="btn btn-default">{{vm.post._id ? 'Update' : 'Create'}}</button>
            </div>
            <div ng-show="vm.error" class="text-danger">
              <strong ng-bind="vm.error"></strong>
            </div>
          </div>

        </fieldset>
      </form>
    </div>
  </div>

</section>
