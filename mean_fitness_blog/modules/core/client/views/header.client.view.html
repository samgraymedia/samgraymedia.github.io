<section id="top" data-ng-controller="HeaderController">
  <header>
    <div class="wrap">
      <div class="left">
        <div class="logo"><a href="/"><img src="modules/core/img/brand/logo.png" alt="alt"></a></div>
      </div>
      <div class="right">
        <div class="social"><a class="GP" href="https://plus.google.com/+Redweb"></a><a class="FB" href="https://www.facebook.com/RedwebUK/"></a><a class="TW" href="https://twitter.com/redweb"></a>
          <button class="follow">follow us</button>
          <div class="search" id="popup-js"></div>

        </div>
        <div class="user_panel">
          <img data-ng-src="{{authentication.user.profileImageURL}}" alt="{{authentication.user.displayName}}" class="header-profile-image" />
          <ul class="user" data-ng-show="authentication.user">
            <li class="dropdown" dropdown>
              <a class="dropdown-toggle user-header-dropdown-toggle" dropdown-toggle role="button">
              </a>
              <ul class="dropdown-menu" role="menu">
                <span data-ng-bind="authentication.user.displayName"></span> <b class="caret"></b>
                <li data-ui-sref-active="active">
                  <a data-ui-sref="settings.profile">Edit Profile</a>
                </li>
                <li data-ui-sref-active="active">
                  <a data-ui-sref="settings.picture">Change Profile Picture</a>
                </li>
                <li data-ui-sref-active="active" data-ng-show="authentication.user.provider === 'local'">
                  <a data-ui-sref="settings.password">Change Password</a>
                </li>
                <li data-ui-sref-active="active">
                  <a data-ui-sref="settings.accounts">Manage Social Accounts</a>
                </li>
                <li class="divider"></li>
                <li>
                  <a href="/api/auth/signout" target="_self">Signout</a>
                </li>
              </ul>
            </li>
          </ul>

        </div>

      </div>
    </div>
  </header>
  <section class="nav">
    <div class="wrap">
      <nav class="catogories">
        <ul>
          <li><a class="weights" href="/weights">weights</a></li>
          <li><a class="stamina" href="/stamina">stamina</a></li>
          <li><a class="sport" href="/sport">sport</a></li>
        </ul>
      </nav>
      <nav class="main">
        <ul>
          <li><a href="/">Home</a></li>
          <li><a href="/about">About</a></li>
          <li data-ng-repeat="item in menu.items | orderBy: 'position'" data-ng-if="item.shouldRender(authentication.user);" ng-switch="item.type" data-ng-class="{ active: $state.includes(item.state), dropdown: item.type === 'dropdown' }" class="{{item.class}}"
            dropdown="item.type === 'dropdown'">
            <a ng-switch-when="dropdown" class="dropdown-toggle" dropdown-toggle role="button">{{::item.title}}&nbsp;<span class="caret"></span></a>
            <ul ng-switch-when="dropdown" class="dropdown-menu">
              <li data-ng-repeat="subitem in item.items | orderBy: 'position'" data-ng-if="subitem.shouldRender(authentication.user);" data-ui-sref-active="active">
                <a data-ui-sref="{{subitem.state}}" data-ng-bind="subitem.title"></a>
              </li>
            </ul>
            <a ng-switch-default data-ui-sref="{{item.state}}" data-ng-bind="item.title"></a>
          </li>
          <li><a href="/faw">FAQs</a></li>
          <li><a href="/contact">Contact</a></li>
          <li data-ng-hide="authentication.user" data-ui-sref-active="active">
            <a data-ui-sref="authentication.signup">Sign Up</a>
          </li>
          <li data-ng-hide="authentication.user" data-ui-sref-active="active">
            <a data-ui-sref="authentication.signin">Sign In</a>
          </li>
        </ul>
      </nav>
    </div>
  </section>
